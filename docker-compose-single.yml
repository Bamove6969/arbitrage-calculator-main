services:
  # IB Gateway (separate container - Java app with GUI)
  ibga:
    image: heshiming/ibga
    container_name: ibga-trading
    restart: always
    ipc: host
    shm_size: 512mb
    environment:
      - TERM=xterm
      - IB_USERNAME=fiend6969
      - IB_PASSWORD=fj4T-U4FnouobkzN-UL7
      - IB_REGION=America
      - IB_TIMEZONE=America/Vancouver
      - IB_LOGINTAB=IB API
      - IB_LOGINTYPE=Live Trading
      - IB_PREFER_IBKEY=true
    volumes:
      - ./data:/home/ibg_settings
    ports:
      - "15800:5800"
      - "40000:4000"
      - "40010:4001"
      - "40020:4002"
    networks:
      - arbitrage-net

  # Everything else in ONE container
  arbitrage-all-in-one:
    build:
      context: .
      dockerfile: Dockerfile.single
    container_name: arbitrage-all-in-one
    restart: always
    user: "1000:1000"
    shm_size: 4gb
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "8000:8000"
      - "4040:4040"
      - "5000:5000"
    environment:
      - PYTHONPATH=/app
      - IB_GATEWAY_URL=http://ibga:4001
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LLM_PROVIDER=openrouter
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - NGROK_AUTH_TOKEN=${NGROK_AUTH_TOKEN}
      - ORACLE_EXECUTOR_URL=http://localhost:5000
    volumes:
      - ./backend:/app/backend
      - ./reports:/app/reports
      - ./Cloud_GPU_Matcher_v3_Auto.ipynb:/app/Cloud_GPU_Matcher_v3_Auto.ipynb
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - ibga
    networks:
      - arbitrage-net
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 3G

networks:
  arbitrage-net:
    driver: bridge
